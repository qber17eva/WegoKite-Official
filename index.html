<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WegoKite | Luxury Sports Resort</title>
    
    <!-- 1. 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 2. 色彩與字體系統 (Claude 的零件 A) */
        :root {
            --primary-tiffany: #0ABAB5;
            --secondary-white: #FFFFFF;
            --text-black: #000000;
            --accent-grey: #F8F9FA;
            --luxury-gold: #D4AF37;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        body, p, span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            margin: 0;
            padding: 0;
            color: var(--text-black);
        }

        /* 3. WhatsApp 樣式 (Claude 的零件 B) */
        .whatsapp-global-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .whatsapp-cta {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(37,211,102,0.3);
            transition: transform 0.3s ease;
        }

        .whatsapp-cta:hover {
            transform: scale(1.05);
        }

        /* 簡單的主頁排版 */
        header {
            height: 60vh;
            background-color: var(--accent-grey);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 5px solid var(--primary-tiffany);
        }

        .btn-tiffany {
            background-color: var(--primary-tiffany);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 4. 主頁內容 (Claude 的零件 C) -->
    <header>
        <div>
            <h1>WegoKite</h1>
            <p>Experiência Exclusiva em Taíba</p>
            <br>
            <a href="#contato" class="btn-tiffany">Descubra Mais</a>
        </div>
    </header>

    <!-- 5. WhatsApp 按鈕 (Claude 的零件 D) -->
    <div class="whatsapp-global-float">
        <a href="https://wa.me/5585988966884?text=Olá%20WegoKite!%20Gostaria%20de%20mais%20informações%20sobre%20seus%20serviços%20exclusivos%20🏄‍♂️" 
           class="whatsapp-cta" target="_blank">
            <i class="fab fa-whatsapp"></i>
            <span>Fale conosco agora</span>
        </a>
    </div>

</body>
</html>
